{% extends 'base_auth.html' %}
{% block title %}Check your email - Agora{% endblock %}

{% block content %}
<div class="text-center">

    <div class="w-16 h-16 bg-green-500/10 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
    </div>

    <h1 class="text-2xl font-bold mb-2">Check your email</h1>
    <p class="text-zinc-400 text-sm mb-6">
        We sent a password reset link to
        <span class="text-white font-medium">you@university.edu</span>
    </p>

    <button type="button" class="text-sm text-red-500 hover:text-red-400 transition-colors mb-6 block w-full">
        Didn't receive it? Resend
    </button>

    <a href="{{ url_for('auth.login') }}"
       class="block w-full border border-zinc-700 hover:bg-zinc-900 text-white font-semibold
              py-3 rounded-full transition-colors text-[15px]">
        Back to login
    </a>

</div>
{% endblock %}
