{% extends 'base_auth.html' %}
{% block title %}Verify your email - Agora{% endblock %}

{% block content %}
<div class="text-center">

    <div class="flex gap-1.5 mb-8">
        <div class="h-1 flex-1 bg-red-600 rounded-full"></div>
        <div class="h-1 flex-1 bg-red-600 rounded-full"></div>
        <div class="h-1 flex-1 bg-red-600 rounded-full"></div>
        <div class="h-1 flex-1 bg-red-600 rounded-full"></div>
        <div class="h-1 flex-1 bg-zinc-800 rounded-full"></div>
    </div>

    <div class="w-16 h-16 bg-red-600/10 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
    </div>

    <p class="text-sm text-zinc-500 mb-1">Step 4 of 5</p>
    <h1 class="text-2xl font-bold mb-2">Check your email</h1>
    <p class="text-zinc-400 text-sm mb-8">We sent a 6-digit code to <span class="text-white font-medium">you@university.edu</span></p>

    <form action="{{ url_for('auth.signup_profile') }}" method="GET">
        <div class="flex justify-center gap-2 mb-6">
            {% for i in range(6) %}
            <input type="text" maxlength="1" name="code_{{ i }}"
                   class="w-12 h-12 bg-zinc-900 border border-zinc-700 focus:border-red-600
                          rounded-xl text-center text-xl font-bold text-white outline-none transition-colors">
            {% endfor %}
        </div>

        <button type="submit"
                class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-full
                       transition-colors text-[16px] mb-4">
            Verify
        </button>
    </form>

    <button type="button" class="text-sm text-red-500 hover:text-red-400 transition-colors">
        Resend code
    </button>

</div>
{% endblock %}
