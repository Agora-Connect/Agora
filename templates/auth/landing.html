{% extends 'base_auth.html' %}
{% block title %}Agora{% endblock %}

{% block content %}
<div>

    <h1 class="font-display text-3xl font-bold tracking-wide mb-2">Join the conversation.</h1>
    <p class="text-zinc-400 text-[15px] mb-8">SCSU's academic community, all in one place.</p>

    <div class="space-y-3">
        <a href="{{ url_for('auth.signup') }}"
           class="block w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6
                  rounded-full text-[16px] text-center transition-colors">
            Create Account
        </a>

        <a href="{{ url_for('auth.login') }}"
           class="block w-full bg-transparent hover:bg-zinc-900 text-white font-semibold py-3 px-6
                  rounded-full text-[16px] text-center transition-colors border border-zinc-700">
            Sign In
        </a>
    </div>

    <p class="mt-8 text-zinc-600 text-xs text-center">
        For @stcloudstate.edu and @go.stcloudstate.edu accounts only.
    </p>

</div>
{% endblock %}
