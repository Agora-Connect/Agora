{% extends 'base_auth.html' %}
{% block title %}Agora - Where university conversations happen{% endblock %}

{% block content %}
<div class="text-center">

    <div class="mb-10">
        <h1 class="text-6xl font-bold text-white tracking-tight">Agora</h1>
        <p class="text-zinc-400 mt-3 text-lg">Where university conversations happen</p>
    </div>

    <div class="space-y-3">
        <a href="{{ url_for('auth.signup') }}"
           class="block w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6
                  rounded-full text-[16px] transition-colors">
            Create Account
        </a>

        <a href="{{ url_for('auth.login') }}"
           class="block w-full bg-transparent hover:bg-zinc-900 text-white font-bold py-3 px-6
                  rounded-full text-[16px] transition-colors border border-zinc-600">
            Sign In
        </a>
    </div>

    <p class="mt-10 text-zinc-600 text-xs">
        For SCSU students only &mdash; @stcloudstate.edu accounts
    </p>

</div>
{% endblock %}
