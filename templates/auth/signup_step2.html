{% extends 'base_auth.html' %}
{% block title %}University details - Agora{% endblock %}

{% block content %}
<div>
    <a href="{{ url_for('auth.signup_step1') }}"
       class="inline-flex items-center gap-2 text-zinc-400 hover:text-white text-sm mb-6 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
        Back
    </a>

    <div class="flex gap-1.5 mb-6">
        <div class="h-1 flex-1 bg-red-600 rounded-full"></div>
        <div class="h-1 flex-1 bg-red-600 rounded-full"></div>
        <div class="h-1 flex-1 bg-zinc-800 rounded-full"></div>
        <div class="h-1 flex-1 bg-zinc-800 rounded-full"></div>
        <div class="h-1 flex-1 bg-zinc-800 rounded-full"></div>
    </div>

    {% if error %}
    <div class="bg-red-500/10 border border-red-500/30 text-red-400 px-4 py-3 rounded-xl mb-4 text-sm">
        {{ error }}
    </div>
    {% endif %}
    <p class="text-sm text-zinc-500 mb-1">Step 2 of 5</p>
    <h1 class="text-2xl font-bold mb-6">University details</h1>

    <form action="{{ url_for('auth.signup_step2') }}" method="POST" class="space-y-4">

        <div>
            <label class="block text-sm font-medium text-zinc-400 mb-1.5">University</label>
            <input type="text" name="university" placeholder="Search your university..."
                   class="w-full bg-zinc-900 border border-zinc-700 focus:border-red-600
                          rounded-xl px-4 py-3 text-white placeholder-zinc-600 outline-none transition-colors text-[15px]"
                   required>
        </div>

        <div>
            <label class="block text-sm font-medium text-zinc-400 mb-1.5">Major / Department</label>
            <select name="major" class="w-full bg-zinc-900 border border-zinc-700 focus:border-red-600
                                        rounded-xl px-4 py-3 text-white outline-none transition-colors text-[15px]">
                <option value="">Select your major</option>
                <option>Computer Science</option>
                <option>Mathematics</option>
                <option>Physics</option>
                <option>Chemistry</option>
                <option>Biology</option>
                <option>Engineering</option>
                <option>Economics</option>
                <option>Psychology</option>
                <option>English</option>
                <option>Informatics</option>
                <option>Other</option>
            </select>
        </div>

        <div>
            <label class="block text-sm font-medium text-zinc-400 mb-1.5">Year</label>
            <select name="year" class="w-full bg-zinc-900 border border-zinc-700 focus:border-red-600
                                       rounded-xl px-4 py-3 text-white outline-none transition-colors text-[15px]">
                <option value="">Select your year</option>
                <option>Freshman</option>
                <option>Sophomore</option>
                <option>Junior</option>
                <option>Senior</option>
                <option>Graduate Student</option>
                <option>Faculty</option>
                <option>Staff</option>
            </select>
        </div>

        <button type="submit"
                class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-full
                       transition-colors text-[16px] mt-2">
            Next
        </button>

    </form>
</div>
{% endblock %}
