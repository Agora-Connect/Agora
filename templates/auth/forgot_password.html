{% extends 'base_auth.html' %}
{% block title %}Forgot password - Agora{% endblock %}

{% block content %}
<div>
    <a href="{{ url_for('auth.login') }}"
       class="inline-flex items-center gap-2 text-zinc-400 hover:text-white text-sm mb-6 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
        Back to login
    </a>

    <h1 class="text-2xl font-bold mb-2">Forgot your password?</h1>
    <p class="text-zinc-400 text-sm mb-6">Enter your email and we'll send you a reset link.</p>

    <form action="{{ url_for('auth.forgot_password_sent') }}" method="GET" class="space-y-4">

        <div>
            <label class="block text-sm font-medium text-zinc-400 mb-1.5">Email Address</label>
            <input type="email" name="email" placeholder="you@university.edu"
                   class="w-full bg-zinc-900 border border-zinc-700 focus:border-red-600
                          rounded-xl px-4 py-3 text-white placeholder-zinc-600 outline-none transition-colors text-[15px]"
                   required>
        </div>

        <button type="submit"
                class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-full
                       transition-colors text-[16px]">
            Send Reset Link
        </button>

    </form>
</div>
{% endblock %}
