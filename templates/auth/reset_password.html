{% extends 'base_auth.html' %}
{% block title %}Reset password - Agora{% endblock %}

{% block content %}
<div>
    <h1 class="text-2xl font-bold mb-2">Create new password</h1>
    <p class="text-zinc-400 text-sm mb-6">Choose a strong password for your account.</p>

    <form action="{{ url_for('auth.login') }}" method="GET" class="space-y-4">

        <div>
            <label class="block text-sm font-medium text-zinc-400 mb-1.5">New Password</label>
            <input type="password" name="password" placeholder="Min. 8 characters"
                   class="w-full bg-zinc-900 border border-zinc-700 focus:border-red-600
                          rounded-xl px-4 py-3 text-white placeholder-zinc-600 outline-none transition-colors text-[15px]"
                   required>
        </div>

        <div>
            <label class="block text-sm font-medium text-zinc-400 mb-1.5">Confirm New Password</label>
            <input type="password" name="confirm_password" placeholder="Repeat password"
                   class="w-full bg-zinc-900 border border-zinc-700 focus:border-red-600
                          rounded-xl px-4 py-3 text-white placeholder-zinc-600 outline-none transition-colors text-[15px]"
                   required>
        </div>

        <button type="submit"
                class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-full
                       transition-colors text-[16px]">
            Reset Password
        </button>

    </form>
</div>
{% endblock %}
