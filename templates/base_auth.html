<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Agora{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        display: ['Cinzel', 'Georgia', 'serif']
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { -webkit-font-smoothing: antialiased; }
    </style>
</head>
<body class="bg-black text-white font-sans min-h-screen">

    <div class="min-h-screen flex">

        <!-- Left brand panel (desktop only) -->
        <div class="hidden lg:flex flex-col justify-between w-1/2 bg-black border-r border-zinc-900 p-14">

            <!-- Wordmark -->
            <div class="flex items-center gap-3">
                <img src="{{ url_for('static', filename='favicon.png') }}" class="h-10 w-10 rounded-full flex-shrink-0" alt="Agora">
                <span class="font-display text-2xl font-bold tracking-[0.15em] text-white">AGORA</span>
            </div>

            <!-- Center headline -->
            <div>
                <h2 class="font-display text-5xl font-bold text-white leading-tight mb-5">
                    Where Huskies<br>
                    <span class="text-red-600">learn together.</span>
                </h2>
                <p class="text-zinc-400 text-lg leading-relaxed max-w-sm">
                    Ask questions. Share resources. Connect with classmates. Built exclusively for SCSU.
                </p>
            </div>

            <!-- Bottom SCSU note -->
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-red-600 flex-shrink-0"></div>
                <span class="text-zinc-600 text-sm">St. Cloud State University</span>
            </div>

        </div>

        <!-- Right form panel -->
        <div class="flex-1 flex flex-col justify-center items-center p-8 min-h-screen">

            <!-- Mobile wordmark -->
            <div class="lg:hidden flex items-center gap-2.5 mb-10">
                <img src="{{ url_for('static', filename='favicon.png') }}" class="h-8 w-8 rounded-full flex-shrink-0" alt="Agora">
                <span class="font-display text-xl font-bold tracking-[0.15em]">AGORA</span>
            </div>

            <div class="w-full max-w-sm">
                {% block content %}{% endblock %}
            </div>

        </div>

    </div>

</body>
</html>
