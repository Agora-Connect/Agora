{% extends 'base.html' %}
{% block title %}Edit profile - Agora{% endblock %}

{% block content %}

<div class="sticky top-0 bg-black/80 backdrop-blur-md border-b border-zinc-800 z-10 px-4 py-3 flex items-center justify-between">
    <a href="{{ url_for('profile.view', username=user.username) }}"
       class="text-zinc-300 hover:text-white font-medium text-[15px] transition-colors">
        Cancel
    </a>
    <h1 class="text-[17px] font-bold">Edit profile</h1>
    <button type="submit" form="edit-form"
            class="bg-white hover:bg-zinc-200 text-black font-bold px-4 py-1.5 rounded-full text-[14px] transition-colors">
        Save
    </button>
</div>

<!-- Banner -->
<div class="h-28 bg-gradient-to-br from-red-900/40 to-zinc-900 relative">
    <label class="absolute inset-0 flex items-center justify-center cursor-pointer hover:bg-black/30 transition-colors">
        <input type="file" accept="image/*" class="hidden">
        <svg class="w-8 h-8 text-white/80" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
    </label>
</div>

<!-- Avatar -->
<div class="px-4 -mt-10 mb-4">
    <label class="relative w-20 h-20 block cursor-pointer group">
        <div class="w-20 h-20 rounded-full bg-red-600 border-4 border-black flex items-center justify-center text-white text-2xl font-bold">
            {{ user.display_name[:2]|upper }}
        </div>
        <div class="absolute inset-0 rounded-full bg-black/50 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
            </svg>
        </div>
        <input type="file" accept="image/*" class="hidden">
    </label>
</div>

<form id="edit-form" action="{{ url_for('profile.view', username=user.username) }}" method="GET" class="px-4 space-y-4 pb-8">

    <div>
        <label class="block text-sm font-medium text-zinc-400 mb-1.5">Name</label>
        <input type="text" name="name" value="{{ user.display_name }}"
               class="w-full bg-zinc-900 border border-zinc-700 focus:border-red-600
                      rounded-xl px-4 py-3 text-white outline-none transition-colors text-[15px]">
    </div>

    <div>
        <div class="flex items-center justify-between mb-1.5">
            <label class="text-sm font-medium text-zinc-400">Bio</label>
            <span class="text-xs text-zinc-600">{{ user.bio|length if user.bio else 0 }}/160</span>
        </div>
        <textarea name="bio" maxlength="160" rows="3"
                  class="w-full bg-zinc-900 border border-zinc-700 focus:border-red-600
                         rounded-xl px-4 py-3 text-white outline-none transition-colors resize-none text-[15px]">{{ user.bio or '' }}</textarea>
    </div>

    <div>
        <label class="block text-sm font-medium text-zinc-400 mb-1.5">Location</label>
        <input type="text" name="location" value="{{ user.location or '' }}" placeholder="Your location"
               class="w-full bg-zinc-900 border border-zinc-700 focus:border-red-600
                      rounded-xl px-4 py-3 text-white placeholder-zinc-600 outline-none transition-colors text-[15px]">
    </div>

    <div>
        <label class="block text-sm font-medium text-zinc-400 mb-1.5">Website</label>
        <input type="text" name="website" value="{{ user.website or '' }}" placeholder="yourwebsite.com"
               class="w-full bg-zinc-900 border border-zinc-700 focus:border-red-600
                      rounded-xl px-4 py-3 text-white placeholder-zinc-600 outline-none transition-colors text-[15px]">
    </div>

</form>
{% endblock %}
