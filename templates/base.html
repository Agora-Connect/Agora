<!DOCTYPE html>
<html lang="en" style="background:#000;color:#fff">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Agora{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    colors: {
                        primary: { DEFAULT: '#B91C1C', hover: '#991B1B' },
                        red: {
                            400: '#F87171',
                            500: '#C53030',
                            600: '#B91C1C',
                            700: '#991B1B',
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { -webkit-font-smoothing: antialiased; }
        details summary::-webkit-details-marker { display: none; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f3f; border-radius: 2px; }
    </style>
</head>
<body class="bg-black text-white font-sans min-h-screen" hx-boost="true">

    <div class="flex justify-center min-h-screen max-w-[1400px] mx-auto w-full">

        <!-- Left Sidebar -->
        <aside class="hidden md:flex flex-col sticky top-0 h-screen
                      w-[72px] lg:w-[280px] border-r border-zinc-800 px-2 py-4 flex-shrink-0">
            {% include 'components/left_sidebar.html' %}
        </aside>

        <!-- Main Content -->
        <main class="flex-1 min-w-0 min-h-screen border-r border-zinc-800">
            {% block content %}{% endblock %}
        </main>

        <!-- Right Sidebar -->
        <aside class="hidden lg:block w-[360px] flex-shrink-0 sticky top-0 h-screen overflow-y-auto p-4">
            {% include 'components/right_sidebar.html' %}
        </aside>

    </div>

    <!-- Mobile Bottom Nav -->
    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-black border-t border-zinc-800
                flex justify-around items-center h-14 px-2 z-50">
        {% include 'components/mobile_nav.html' %}
    </nav>
    <div class="md:hidden h-14"></div>

</body>
</html>
