<a href="{{ url_for('main.home') }}"
   class="flex flex-col items-center justify-center w-12 h-12 rounded-full
          {{ 'text-white' if active_page == 'home' else 'text-zinc-500' }}">
    <svg class="w-6 h-6" fill="{{ 'currentColor' if active_page == 'home' else 'none' }}"
         stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
    </svg>
</a>

<a href="{{ url_for('main.explore') }}"
   class="flex flex-col items-center justify-center w-12 h-12 rounded-full
          {{ 'text-white' if active_page == 'explore' else 'text-zinc-500' }}">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
    </svg>
</a>

<a href="{{ url_for('notifications.index') }}"
   class="relative flex flex-col items-center justify-center w-12 h-12 rounded-full
          {{ 'text-white' if active_page == 'notifications' else 'text-zinc-500' }}">
    <svg class="w-6 h-6" fill="{{ 'currentColor' if active_page == 'notifications' else 'none' }}"
         stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
    </svg>
    {% if notification_count > 0 %}
    <span class="absolute top-1 right-1 w-2 h-2 bg-red-600 rounded-full"></span>
    {% endif %}
</a>

<a href="{{ url_for('messages.inbox') }}"
   class="flex flex-col items-center justify-center w-12 h-12 rounded-full
          {{ 'text-white' if active_page == 'messages' else 'text-zinc-500' }}">
    <svg class="w-6 h-6" fill="{{ 'currentColor' if active_page == 'messages' else 'none' }}"
         stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
    </svg>
</a>

<a href="{{ url_for('profile.view', username=current_user.username) }}"
   class="flex flex-col items-center justify-center w-12 h-12 rounded-full
          {{ 'text-white' if active_page == 'profile' else 'text-zinc-500' }}">
    <svg class="w-6 h-6" fill="{{ 'currentColor' if active_page == 'profile' else 'none' }}"
         stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
    </svg>
</a>
