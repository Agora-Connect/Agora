<div class="px-4 py-3 border-b border-zinc-800">
    <form action="{{ url_for('posts.create') }}" method="POST" enctype="multipart/form-data">
        <div class="flex gap-3">

            <!-- Avatar -->
            <div class="flex-shrink-0">
                <div class="w-10 h-10 rounded-full bg-red-600 flex items-center justify-center text-white font-bold">
                    {{ current_user.display_name[:2]|upper }}
                </div>
            </div>

            <div class="flex-1">
                <textarea name="content"
                          placeholder="What's happening in class?"
                          class="w-full bg-transparent text-[18px] placeholder-zinc-600 resize-none
                                 outline-none border-none min-h-[56px] py-2 leading-relaxed"
                          rows="2"
                          maxlength="280"
                          required></textarea>

                <!-- Course selector -->
                <div class="mb-3">
                    <select name="course_id"
                            class="bg-zinc-900 text-red-400 text-sm font-medium px-3 py-1.5 rounded-full
                                   border border-zinc-800 outline-none cursor-pointer">
                        <option value="">Select course...</option>
                        {% for course in courses if courses is defined %}
                        <option value="{{ course.id }}">{{ course.code }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="border-t border-zinc-800 pt-3 flex items-center justify-between">

                    <!-- Attachment icons -->
                    <div class="flex items-center gap-1 -ml-1">
                        <label class="w-8 h-8 rounded-full hover:bg-zinc-800 flex items-center justify-center
                                      text-red-500 cursor-pointer transition-colors" title="Image">
                            <input type="file" name="image" accept="image/*" class="hidden">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                            </svg>
                        </label>
                        <button type="button" title="Anonymous post"
                                class="w-8 h-8 rounded-full hover:bg-zinc-800 flex items-center justify-center
                                       text-red-500 cursor-pointer transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                            </svg>
                        </button>
                    </div>

                    <button type="submit"
                            class="bg-red-600 hover:bg-red-700 text-white font-bold px-5 py-1.5 rounded-full
                                   transition-colors text-[15px]">
                        Post
                    </button>
                </div>
            </div>

        </div>
    </form>
</div>
