{% extends 'base.html' %}
{% block title %}Groups - Agora{% endblock %}

{% block content %}

<div class="sticky top-0 bg-black/80 backdrop-blur-md border-b border-zinc-800 z-10 px-4 py-3 flex items-center justify-between">
    <h1 class="text-xl font-bold">Groups</h1>
    <a href="#"
       class="bg-red-600 hover:bg-red-700 text-white font-bold px-4 py-1.5 rounded-full text-[14px] transition-colors">
        Create Group
    </a>
</div>

{% for group in groups %}
<div class="px-4 py-4 border-b border-zinc-800 hover:bg-zinc-950 transition-colors">
    <div class="flex items-start gap-3">
        <div class="w-12 h-12 rounded-2xl bg-red-600/10 flex items-center justify-center flex-shrink-0">
            <svg class="w-6 h-6 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
            </svg>
        </div>
        <div class="flex-1 min-w-0">
            <div class="flex items-start justify-between gap-3">
                <div>
                    <h3 class="font-bold text-[16px]">{{ group.name }}</h3>
                    <p class="text-zinc-500 text-[14px] mt-0.5">{{ group.members }} members</p>
                    <p class="text-zinc-400 text-[14px] mt-1">{{ group.description }}</p>
                </div>
                <button class="border border-zinc-600 hover:border-zinc-400 text-white font-semibold
                               px-3 py-1.5 rounded-full text-[13px] transition-colors flex-shrink-0">
                    Join
                </button>
            </div>
        </div>
    </div>
</div>
{% endfor %}

{% endblock %}
