{% extends 'base.html' %}
{% block title %}New Post - Agora{% endblock %}

{% block content %}
<div class="sticky top-0 bg-black/80 backdrop-blur-md border-b border-zinc-800 z-10 px-4 py-3 flex items-center justify-between">
    <a href="javascript:history.back()"
       class="text-zinc-300 hover:text-white font-medium text-[15px] transition-colors">
        Cancel
    </a>
    <h1 class="text-[17px] font-bold">New Post</h1>
    <div class="w-16"></div>
</div>

<div class="px-4 py-4">
    <form action="{{ url_for('posts.create') }}" method="POST" enctype="multipart/form-data">
        <div class="flex gap-3">
            <div class="w-10 h-10 rounded-full bg-red-600 flex items-center justify-center text-white font-bold flex-shrink-0">
                {{ current_user.display_name[:2]|upper }}
            </div>
            <div class="flex-1">
                <textarea name="content" placeholder="What's happening in class?"
                          class="w-full bg-transparent text-[18px] placeholder-zinc-600 resize-none
                                 outline-none min-h-[120px] py-1 leading-relaxed"
                          autofocus></textarea>

                <!-- Course select -->
                <select name="course_id"
                        class="mt-3 bg-zinc-900 text-red-400 text-sm font-medium px-3 py-2 rounded-full
                               border border-zinc-800 outline-none">
                    <option value="">Select course (optional)...</option>
                    {% for course in courses %}
                    <option value="{{ course.id }}">{{ course.code }}</option>
                    {% endfor %}
                </select>

                <!-- Anonymous toggle -->
                <label class="flex items-center gap-2 mt-3 cursor-pointer">
                    <input type="checkbox" name="is_anonymous" class="w-4 h-4 accent-red-600 rounded">
                    <span class="text-sm text-zinc-400">Post anonymously</span>
                </label>

                <div class="border-t border-zinc-800 mt-4 pt-4 flex items-center justify-between">
                    <label class="w-9 h-9 rounded-full hover:bg-zinc-800 flex items-center justify-center
                                  text-red-500 cursor-pointer transition-colors" title="Add image">
                        <input type="file" name="image" accept="image/*" class="hidden">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                        </svg>
                    </label>

                    <button type="submit"
                            class="bg-red-600 hover:bg-red-700 text-white font-bold px-6 py-2
                                   rounded-full transition-colors text-[15px]">
                        Post
                    </button>
                </div>
            </div>
        </div>
    </form>
</div>
{% endblock %}
