{% extends 'base.html' %}
{% block title %}Share a Resource - Agora{% endblock %}

{% block content %}

<div class="sticky top-0 bg-black/80 backdrop-blur-md border-b border-zinc-800 z-10 px-4 py-3 flex items-center gap-4">
    <a href="{{ url_for('resources.index') }}"
       class="w-9 h-9 rounded-full hover:bg-zinc-900 flex items-center justify-center transition-colors text-zinc-300">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
    </a>
    <h1 class="text-xl font-bold">Share a Resource</h1>
</div>

<div class="px-4 py-6">
    {% if error %}
    <div class="bg-red-600/10 border border-red-600/30 text-red-400 text-[14px] px-4 py-3 rounded-xl mb-4">
        {{ error }}
    </div>
    {% endif %}

    <form action="{{ url_for('resources.create') }}" method="POST">
        <div class="space-y-4">

            <!-- Course -->
            <div>
                <label class="block text-[13px] text-zinc-400 font-medium mb-1.5">Course *</label>
                <select name="course_id" required
                        class="w-full bg-zinc-900 text-white text-[15px] px-4 py-3 rounded-xl
                               border border-zinc-800 outline-none focus:border-red-600">
                    <option value="">Select a course...</option>
                    {% for course in courses %}
                    <option value="{{ course.id }}">{{ course.code }} — {{ course.name }}</option>
                    {% endfor %}
                </select>
                {% if not courses %}
                <p class="text-zinc-500 text-[13px] mt-1">
                    <a href="{{ url_for('classes.index') }}" class="text-red-400 hover:underline">Enroll in a course</a> first.
                </p>
                {% endif %}
            </div>

            <!-- Type -->
            <div>
                <label class="block text-[13px] text-zinc-400 font-medium mb-1.5">Resource Type *</label>
                <select name="type" required
                        class="w-full bg-zinc-900 text-white text-[15px] px-4 py-3 rounded-xl
                               border border-zinc-800 outline-none focus:border-red-600">
                    <option value="">Select type...</option>
                    <option value="notes">Notes</option>
                    <option value="textbook">Textbook</option>
                    <option value="practice">Practice Problems</option>
                    <option value="slides">Slides</option>
                    <option value="guide">Study Guide</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <!-- Title -->
            <div>
                <label class="block text-[13px] text-zinc-400 font-medium mb-1.5">Title *</label>
                <input type="text" name="title" required
                       placeholder="e.g. CSCI 411 Midterm Study Notes"
                       maxlength="200"
                       class="w-full bg-zinc-900 text-white text-[15px] px-4 py-3 rounded-xl
                              border border-zinc-800 outline-none focus:border-red-600
                              placeholder-zinc-600">
            </div>

            <!-- Description -->
            <div>
                <label class="block text-[13px] text-zinc-400 font-medium mb-1.5">Description <span class="text-zinc-600">(optional)</span></label>
                <textarea name="description"
                          placeholder="Describe what this resource covers..."
                          rows="4"
                          class="w-full bg-zinc-900 text-white text-[15px] px-4 py-3 rounded-xl
                                 border border-zinc-800 outline-none focus:border-red-600
                                 placeholder-zinc-600 resize-none leading-relaxed"></textarea>
            </div>

            <button type="submit"
                    class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-full
                           transition-colors text-[16px]">
                Share Resource
            </button>
        </div>
    </form>
</div>

{% endblock %}
