{% extends 'base.html' %}
{% block title %}Password - Settings{% endblock %}

{% block content %}
<div class="sticky top-0 bg-black/80 backdrop-blur-md border-b border-zinc-800 z-10 px-4 py-3 flex items-center gap-4">
    <a href="{{ url_for('settings.index') }}"
       class="w-9 h-9 rounded-full hover:bg-zinc-900 flex items-center justify-center transition-colors text-zinc-300">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
    </a>
    <h1 class="text-xl font-bold">Change Password</h1>
</div>

<form class="px-4 py-4 space-y-4">
    {% for label, name in [('Current password', 'current'), ('New password', 'new'), ('Confirm new password', 'confirm')] %}
    <div>
        <label class="block text-sm font-medium text-zinc-400 mb-1.5">{{ label }}</label>
        <input type="password" name="{{ name }}_password" placeholder="••••••••"
               class="w-full bg-zinc-900 border border-zinc-700 focus:border-red-600
                      rounded-xl px-4 py-3 text-white placeholder-zinc-600 outline-none transition-colors text-[15px]">
    </div>
    {% endfor %}
    <button type="submit" class="bg-red-600 hover:bg-red-700 text-white font-bold px-6 py-2.5 rounded-full transition-colors text-[15px]">
        Update Password
    </button>
</form>
{% endblock %}
